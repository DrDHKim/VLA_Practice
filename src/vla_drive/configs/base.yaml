seed: 42
device: auto
precision: bf16

data:
  root: data/processed
  batch_size: 1
  num_workers: 4
  image_size: 448
  waypoint_count: 8
  waypoint_interval_s: 0.5

model:
  backbone_name: Qwen/Qwen2.5-VL-3B-Instruct
  freeze_backbone: true
  use_lora: true
  lora_rank: 8
  lora_alpha: 16
  hidden_dim: 1024

training:
  epochs: 5
  lr: 0.0001
  weight_decay: 0.01
  grad_accum_steps: 8
  max_grad_norm: 1.0
  log_every: 20
  save_every: 1000

evaluation:
  output_dir: outputs/reports
