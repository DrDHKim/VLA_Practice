defaults:
  - base

data:
  dataset: carla
  root: /Volumes/DATASET/vla_drive_carla/tiny

simulation:
  host: 127.0.0.1
  port: 2000
  town: Town01
  weather: ClearNoon
  timeout_seconds: 30.0
  synchronous_mode: true
  fixed_delta_seconds: 0.05

collection:
  seconds: 30.0
  fps: 10.0
  warmup_seconds: 2.0
  image_width: 640
  image_height: 360
  fov: 90.0
  vehicle_filter: vehicle.tesla.model3
  driving_stack: traffic_manager
  speed_control: percentage
  assumed_speed_limit_kmh: 30.0
  auto_lane_change: false
  ignore_lights_percentage: 100.0
  ignore_signs_percentage: 100.0
  ignore_vehicles_percentage: 100.0
  distance_to_leading_vehicle_m: 3.0
  target_speed_mps: 6.0
  use_fixed_path: false
  min_motion_speed_mps: 0.2
  min_sample_speed_mps: 0.0
  max_sample_brake: 1.0
  route_length: 80
  waypoint_spacing_m: 2.0
  future_waypoint_count: 8
