defaults:
  - base

data:
  dataset: carla
  root: /Volumes/DATASET/vla_drive_carla/mac_dataset_60s_320x180

simulation:
  host: 127.0.0.1
  port: 2000
  town: Town01
  weather: ClearNoon
  timeout_seconds: 120.0
  synchronous_mode: true
  fixed_delta_seconds: 0.05

collection:
  seconds: 60.0
  fps: 10.0                 # 0.5 s temporal step = every 5 frames
  warmup_seconds: 2.0
  image_width: 320
  image_height: 180
  fov: 90.0
  vehicle_filter: vehicle.tesla.model3
  driving_stack: traffic_manager
  speed_control: percentage
  assumed_speed_limit_kmh: 30.0
  auto_lane_change: false
  ignore_lights_percentage: 0.0
  ignore_signs_percentage: 0.0
  ignore_vehicles_percentage: 0.0
  distance_to_leading_vehicle_m: 3.0
  npc_vehicle_count: 20
  npc_vehicle_filter: vehicle.tesla.model3
  npc_vehicle_target_speed_mps: 4.0
  npc_vehicle_auto_lane_change: false
  pedestrian_count: 30
  pedestrian_cross_factor: 0.7
  pedestrian_running_percentage: 0.1
  pedestrian_walk_speed_mps: 1.4
  pedestrian_run_speed_mps: 3.0
  target_speed_mps: 6.0
  use_fixed_path: false
  route_command_lookahead_mode: meters
  route_command_lookahead_meters: 30.0
  route_command_lookahead_frames: 20
  route_command_yaw_threshold_rad: 0.35
  min_motion_speed_mps: 0.2
  min_sample_speed_mps: 0.0
  max_sample_brake: 1.0
  route_length: 120
  waypoint_spacing_m: 2.0  # used only when use_fixed_path=true
